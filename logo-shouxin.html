<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仁家坪新村 Logo - 瘦金体版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #FDF8F0;
    padding: 3rem 2rem;
    color: #1A1A1A;
    min-height: 100vh;
  }
  .container { max-width: 1000px; margin:0 auto; }
  h1 {
    font-family: 'STJinsong', 'Jinsong Ti', serif;
    text-align: center;
    color: #2D6A4F;
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    text-align: center;
    color: #4A4A4A;
    margin-bottom: 3rem;
    font-size: 0.95rem;
  }
  .logo-preview {
    background: #fff;
    border-radius: 20px;
    padding: 4rem 3rem;
    text-align: center;
    box-shadow: 0 8px 40px rgba(45,106,79,0.1);
    margin-bottom: 3rem;
  }
  .logo-preview h2 {
    font-family: 'Noto Serif SC', serif;
    color: #2D6A4F;
    margin-bottom: 2rem;
    font-size: 1.5rem;
  }
  .logo-svg {
    width: 300px;
    height: 300px;
    margin: 0 auto 2rem;
    filter: drop-shadow(0 8px 24px rgba(45,106,79,0.3));
  }
  .download-section {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2rem;
  }
  .btn {
    padding: 0.8rem 2rem;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, #2D6A4F, #40916C);
    color: #fff;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(45,106,79,0.3);
  }
  .btn-secondary {
    background: #fff;
    color: #2D6A4F;
    border: 2px solid #2D6A4F;
  }
  .btn-secondary:hover {
    background: #2D6A4F;
    color: #fff;
  }
  .font-note {
    background: #F5EDE3;
    border-left: 4px solid #2D6A4F;
    padding: 1rem 1.5rem;
    border-radius: 0 8px 8px 0;
    margin-top: 2rem;
    font-size: 0.9rem;
    color: #1B4332;
    line-height: 1.8;
    text-align: left;
  }
  .font-note strong {
    color: #2D6A4F;
  }
</style>
</head>
<body>
<div class="container">
  <h1>仁家坪新村 Logo</h1>
  <p class="subtitle">瘦金体版 · 笔画瘦硬 · 顿挫有力</p>

  <div class="logo-preview">
    <h2>瘦金体 Logo</h2>
    
    <div class="logo-svg">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="300" height="300">
        <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#40916C;stop-opacity:1" />
          </linearGradient>
          <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
          </filter>
        </defs>
        
        <!-- Circular background -->
        <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" filter="url(#shadow)"/>
        
        <!-- Water ripple decoration -->
        <ellipse cx="200" cy="320" rx="120" ry="8" fill="white" opacity="0.15"/>
        <ellipse cx="200" cy="340" rx="140" ry="6" fill="white" opacity="0.1"/>
        
        <!-- Mountain silhouette -->
        <path d="M 60 310 Q 120 240 160 270 Q 200 220 240 260 Q 280 230 340 290 L 340 400 L 60 400 Z" 
              fill="white" opacity="0.2"/>
        <path d="M 40 350 Q 100 280 150 310 Q 200 260 260 300 Q 320 270 360 320 L 360 400 L 40 400 Z" 
              fill="white" opacity="0.12"/>
        
        <!-- 仁 character - Shouxin Ti (using system font) -->
        <text x="200" y="215" 
              font-family="'STJinsong', 'Jinsong Ti', 'Shouxie Ti', 'Liu Jian Mao Cao', 'ZCOOL XiaoWei', 'Noto Serif SC', serif" 
              font-size="145" 
              fill="white" 
              text-anchor="middle" 
              font-weight="bold"
              style="text-shadow: 0 4px 16px rgba(0,0,0,0.3);">仁</text>
        
        <!-- Village name below -->
        <text x="200" y="285" 
              font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" 
              font-size="26" 
              fill="white" 
              text-anchor="middle" 
              opacity="0.9"
              letter-spacing="3">仁家坪新村</text>
      </svg>
    </div>

    <div class="font-note">
      <strong>ℹ️ 字体说明：</strong><br/>
      瘦金体是宋徽宗创造的书法字体，笔画瘦硬、顿挫明显、风格独特。<br/>
      当前使用系统字体渲染，实际效果取决于您的设备是否已安装瘦金体。<br/>
      推荐的瘦金体字体文件：<br/>
      • Windows: <code>STJinsong.ttf</code>（华文锦松）<br/>
      • macOS: <code>JinsongTi-Regular.otf</code><br/>
      • 开源替代: <a href="https://www.zcool.com.cn/special/zcoolfonts/" target="_blank">站酷字库</a>
    </div>

    <div class="download-section">
      <a href="images/logo-shouxin.svg" download="仁家坪新村-logo-瘦金体.svg" class="btn btn-primary">
        ⬇ 下载 SVG（矢量）
      </a>
      <button onclick="downloadPNG()" class="btn btn-secondary">
        ⬇ 下载 PNG（透明底）
      </button>
    </div>
  </div>
</div>

<script>
function downloadPNG() {
  const svg = document.querySelector('.logo-svg svg');
  const canvas = document.createElement('canvas');
  canvas.width = 800;
  canvas.height = 800;
  const ctx = canvas.getContext('2d');
  
  const data = new XMLSerializer().serializeToString(svg);
  const DOMURL = window.URL || window.webkitURL || window;
  const img = new Image();
  const svgBlob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
  const url = DOMURL.createObjectURL(svgBlob);
  
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 800, 800);
    DOMURL.revokeObjectURL(url);
    
    canvas.toBlob(function(blob) {
      const pngUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = pngUrl;
      a.download = '仁家坪新村-logo-瘦金体-800x800.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(pngUrl);
    });
  };
  img.src = url;
}
</script>
</body>
</html>
